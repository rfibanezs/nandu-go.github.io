<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias! - ÑANDU-GO</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0b3b2f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .highlight {
            color: #f5c542;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 32px;
        }
        .btn {
            background: #f5c542;
            color: #0b3b2f;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
        }
        .btn:hover {
            background: #e6b42c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>¡Gracias <span class="highlight">!</span></h1>
        <p>Hemos recibido tu mensaje. Te contactaremos muy pronto.</p>
        <a href="/" class="btn">Volver a ÑANDU-GO</a>
    </div>
</body>
</html>
